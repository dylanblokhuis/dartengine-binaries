name: Build libdartengine (Windows)

on:
  release:
    types: [published]

env:
  DEPOT_TOOLS_UPDATE: 0
  DEPOT_TOOLS_WIN_TOOLCHAIN: 0 # Use local Visual Studio, not Google-internal toolchain

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # required to update release and upload assets
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git .depot_tools
          echo "$env:GITHUB_WORKSPACE\.depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Append
          echo "PATH=$env:GITHUB_WORKSPACE\.depot_tools;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create python3 wrapper for Windows
        run: |
          @"
          @echo off
          python %*
          "@ | Out-File -FilePath .depot_tools/python3.cmd -Encoding ASCII

      - name: Add Git and create git.bat for depot_tools (Windows)
        shell: pwsh
        run: |
          # depot_tools on Windows looks for 'git.bat'; Git for Windows only provides git.exe.
          # Add Git's bin to PATH so it can be invoked, and add a git.bat wrapper in depot_tools.
          $gitExe = (Get-Command git -ErrorAction SilentlyContinue).Source
          if (-not $gitExe) {
            $gitExe = "C:\Program Files\Git\bin\git.exe"
            if (-not (Test-Path $gitExe)) { $gitExe = "C:\Program Files (x86)\Git\bin\git.exe" }
          }
          if ($gitExe) {
            $gitBin = Split-Path $gitExe
            echo "$gitBin" | Out-File -FilePath $env:GITHUB_PATH -Append
            echo "PATH=$gitBin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          @"
          @echo off
          "git.exe" %*
          "@ | Out-File -FilePath .depot_tools/git.bat -Encoding ASCII

      - name: Fetch Dart SDK
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          Write-Host "Fetching Dart SDK with tag: $tag"
          $env:PATH = "$env:GITHUB_WORKSPACE\.depot_tools;$env:PATH"
          git config --global core.autocrlf false
          New-Item -ItemType Directory -Path dart-sdk -Force
          Push-Location dart-sdk
          fetch --no-history dart
          Pop-Location
          Push-Location dart-sdk/sdk
          $refspec = "refs/tags/$tag" + ":refs/tags/$tag"
          git fetch origin $refspec
          git checkout -f "tags/$tag"
          gclient sync -D --no-history
          Pop-Location
          git config --global core.autocrlf true

      - name: Add libdartengine group to BUILD.gn
        shell: pwsh
        run: |
          Push-Location dart-sdk/sdk
          $script = @'
          import textwrap
          path = "BUILD.gn"
          with open(path, "r") as f:
              content = f.read()
          insert = textwrap.dedent("""
          group("libdartengine") {
            deps = [ "runtime/engine:dart_engine_jit_shared", "runtime/engine:dart_engine_aot_shared" ]
          }

          """)
          old_block = textwrap.dedent("""
          group("analysis_server") {
            deps = [ "utils/analysis_server" ]
          }
          """)
          if old_block not in content:
              old_block = textwrap.dedent("""
          group("analysis_server") {
           deps = [ "utils/analysis_server" ]
          }
          """)
          if old_block in content:
              content = content.replace(old_block, old_block + insert, 1)
          else:
              content = content.replace('if (is_fuchsia) {', insert + 'if (is_fuchsia) {', 1)
          with open(path, "w") as f:
              f.write(content)
          print("Added libdartengine group")
          '@
          python -c $script
          Select-String -Path BUILD.gn -Pattern 'group\("libdartengine"\)' -Context 0,4
          Pop-Location

      - name: Build libdartengine
        shell: pwsh
        run: |
          Push-Location dart-sdk/sdk
          $env:PATH = "$env:GITHUB_WORKSPACE\.depot_tools;$env:PATH"
          python tools/build.py -m release libdartengine
          Pop-Location

      - name: Locate built .dll and .lib artifacts
        id: artifacts
        shell: pwsh
        run: |
          Push-Location dart-sdk/sdk
          # ninja -C out\ReleaseX64 libdartengine → DLLs and .lib import libs in out/ReleaseX64
          $outDir = "out\ReleaseX64"
          $jitDll = Get-ChildItem -Path $outDir -Filter "dart_engine_jit_shared.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          $aotDll = Get-ChildItem -Path $outDir -Filter "dart_engine_aot_shared.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $jitDll -or -not $aotDll) {
            $jitDll = Get-ChildItem -Path out -Recurse -Filter "dart_engine_jit_shared.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
            $aotDll = Get-ChildItem -Path out -Recurse -Filter "dart_engine_aot_shared.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $jitDll -or -not $aotDll) {
            Write-Host "Build output layout (out):"
            Get-ChildItem -Path out -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue
            exit 1
          }
          $basePath = $env:GITHUB_WORKSPACE.TrimEnd('\')
          "jit_path=$($jitDll.FullName.Replace("$basePath\", "").Replace('\', '/'))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "aot_path=$($aotDll.FullName.Replace("$basePath\", "").Replace('\', '/'))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          # .lib import libraries (required for linking against the DLL on Windows)
          $jitDir = Split-Path $jitDll.FullName
          $jitLib = Get-ChildItem -Path $jitDir -Filter "dart_engine_jit_shared.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          $aotLib = Get-ChildItem -Path $jitDir -Filter "dart_engine_aot_shared.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($jitLib) { "jit_lib_path=$($jitLib.FullName.Replace("$basePath\", "").Replace('\', '/'))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append }
          if ($aotLib) { "aot_lib_path=$($aotLib.FullName.Replace("$basePath\", "").Replace('\', '/'))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append }
          Write-Host "Found: jit $($jitDll.FullName), aot $($aotDll.FullName)"
          if ($jitLib) { Write-Host "Found jit .lib: $($jitLib.FullName)" }
          if ($aotLib) { Write-Host "Found aot .lib: $($aotLib.FullName)" }
          Pop-Location

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ${{ steps.artifacts.outputs.jit_path }}
            ${{ steps.artifacts.outputs.aot_path }}
            ${{ steps.artifacts.outputs.jit_lib_path }}
            ${{ steps.artifacts.outputs.aot_lib_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
