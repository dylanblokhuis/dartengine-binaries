name: Build libdartengine (Windows)

on:
  release:
    types: [published]

env:
  DEPOT_TOOLS_UPDATE: 0
  DEPOT_TOOLS_WIN_TOOLCHAIN: 0 # Use local Visual Studio, not Google-internal toolchain

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # required to update release and upload assets
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git .depot_tools
          echo "$env:GITHUB_WORKSPACE\.depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Append
          echo "PATH=$env:GITHUB_WORKSPACE\.depot_tools;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create python3 wrapper for Windows
        run: |
          @"
          @echo off
          python %*
          "@ | Out-File -FilePath .depot_tools/python3.cmd -Encoding ASCII

      - name: Add Git and create git.bat for depot_tools (Windows)
        shell: pwsh
        run: |
          # depot_tools on Windows looks for 'git.bat'; Git for Windows only provides git.exe.
          # Add Git's bin to PATH so it can be invoked, and add a git.bat wrapper in depot_tools.
          $gitExe = (Get-Command git -ErrorAction SilentlyContinue).Source
          if (-not $gitExe) {
            $gitExe = "C:\Program Files\Git\bin\git.exe"
            if (-not (Test-Path $gitExe)) { $gitExe = "C:\Program Files (x86)\Git\bin\git.exe" }
          }
          if ($gitExe) {
            $gitBin = Split-Path $gitExe
            echo "$gitBin" | Out-File -FilePath $env:GITHUB_PATH -Append
            echo "PATH=$gitBin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          @"
          @echo off
          "git.exe" %*
          "@ | Out-File -FilePath .depot_tools/git.bat -Encoding ASCII

      - name: Fetch Dart SDK
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          Write-Host "Fetching Dart SDK with tag: $tag"
          $env:PATH = "$env:GITHUB_WORKSPACE\.depot_tools;$env:PATH"
          git config --global core.autocrlf false
          New-Item -ItemType Directory -Path dart-sdk -Force
          Push-Location dart-sdk
          fetch --no-history dart
          Pop-Location
          Push-Location dart-sdk/sdk
          $refspec = "refs/tags/$tag" + ":refs/tags/$tag"
          git fetch origin $refspec
          git checkout -f "tags/$tag"
          gclient sync -D --no-history
          Pop-Location
          git config --global core.autocrlf true

      - name: Add libdartengine group to BUILD.gn
        shell: pwsh
        run: |
          Push-Location dart-sdk/sdk
          $script = @'
          import textwrap
          path = "BUILD.gn"
          with open(path, "r") as f:
              content = f.read()
          insert = textwrap.dedent("""
          group("libdartengine") {
            deps = [
              "runtime/engine:dart_engine_jit_shared",
              "runtime/engine:dart_engine_aot_shared",
              "runtime/bin:gen_snapshot",
              "runtime/bin:dartaotruntime_product",
              "utils/gen_kernel:gen_kernel",
            ]
          }

          """)
          old_block = textwrap.dedent("""
          group("analysis_server") {
            deps = [ "utils/analysis_server" ]
          }
          """)
          if old_block not in content:
              old_block = textwrap.dedent("""
          group("analysis_server") {
           deps = [ "utils/analysis_server" ]
          }
          """)
          if old_block in content:
              content = content.replace(old_block, old_block + insert, 1)
          else:
              content = content.replace('if (is_fuchsia) {', insert + 'if (is_fuchsia) {', 1)
          with open(path, "w") as f:
              f.write(content)
          print("Added libdartengine group")
          '@
          python -c $script
          Select-String -Path BUILD.gn -Pattern 'group\("libdartengine"\)' -Context 0,4
          Pop-Location

      - name: Build libdartengine
        shell: pwsh
        run: |
          Push-Location dart-sdk/sdk
          $env:PATH = "$env:GITHUB_WORKSPACE\.depot_tools;$env:PATH"
          python tools/build.py -m release libdartengine
          Pop-Location

      - name: Locate built artifacts and create zip
        id: artifacts
        shell: pwsh
        run: |
          Push-Location dart-sdk/sdk
          # On Windows all artifacts are in out/ReleaseX64/clang_x64_shared
          $artifactsDir = "out\ReleaseX64\clang_x64_shared"
          $jitDll = Get-Item "$artifactsDir\dart_engine_jit_shared.dll" -ErrorAction Stop
          $aotDll = Get-Item "$artifactsDir\dart_engine_aot_shared.dll" -ErrorAction Stop
          # Windows build outputs .dll.lib and .dll.pdb; we rename to .lib and .pdb in the zip
          $jitLib = Get-Item "$artifactsDir\dart_engine_jit_shared.dll.lib" -ErrorAction SilentlyContinue
          $aotLib = Get-Item "$artifactsDir\dart_engine_aot_shared.dll.lib" -ErrorAction SilentlyContinue
          $jitPdb = Get-Item "$artifactsDir\dart_engine_jit_shared.dll.pdb" -ErrorAction SilentlyContinue
          $aotPdb = Get-Item "$artifactsDir\dart_engine_aot_shared.dll.pdb" -ErrorAction SilentlyContinue
          $genSnapshot = Get-ChildItem -Path out -Recurse -Filter "gen_snapshot.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $dartaotruntime = Get-ChildItem -Path out -Recurse -Filter "dartaotruntime_product.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $vmPlatform = Get-ChildItem -Path out -Recurse -Filter "vm_platform.dill" -ErrorAction SilentlyContinue | Select-Object -First 1
          $genKernelAot = Get-ChildItem -Path out -Recurse -Filter "gen_kernel_aot.dart.snapshot" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $genSnapshot -or -not $vmPlatform -or -not $genKernelAot -or -not $dartaotruntime) {
            Write-Host "Missing gen_snapshot, vm_platform.dill, gen_kernel_aot.dart.snapshot or dartaotruntime"
            if (-not $genSnapshot) { Write-Host "gen_snapshot.exe not found" }
            if (-not $vmPlatform) { Write-Host "vm_platform.dill not found" }
            if (-not $genKernelAot) { Write-Host "gen_kernel_aot.dart.snapshot not found" }
            if (-not $dartaotruntime) { Write-Host "dartaotruntime_product.exe not found" }
            exit 1
          }
          $zipName = "dartengine-${{ github.event.release.tag_name }}-windows.zip"
          $releaseZip = Join-Path $env:GITHUB_WORKSPACE "release_zip"
          New-Item -ItemType Directory -Path $releaseZip -Force | Out-Null
          Copy-Item $jitDll.FullName, $aotDll.FullName -Destination $releaseZip
          if ($jitLib) { Copy-Item $jitLib.FullName -Destination (Join-Path $releaseZip "dart_engine_jit_shared.lib") }
          if ($aotLib) { Copy-Item $aotLib.FullName -Destination (Join-Path $releaseZip "dart_engine_aot_shared.lib") }
          if ($jitPdb) { Copy-Item $jitPdb.FullName -Destination (Join-Path $releaseZip "dart_engine_jit_shared.pdb") }
          if ($aotPdb) { Copy-Item $aotPdb.FullName -Destination (Join-Path $releaseZip "dart_engine_aot_shared.pdb") }
          Copy-Item $genSnapshot.FullName, $vmPlatform.FullName, $genKernelAot.FullName, $dartaotruntime.FullName -Destination $releaseZip
          $zipPath = Join-Path $env:GITHUB_WORKSPACE $zipName
          Compress-Archive -Path "$releaseZip\*" -DestinationPath $zipPath -Force
          "zip_path=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Created $zipName with DLLs, .lib, .pdb, gen_snapshot, dartaotruntime, vm_platform.dill, gen_kernel_aot.dart.snapshot"
          Pop-Location

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ steps.artifacts.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
