name: Build libdartengine (Linux)

on:
  release:
    types: [published]

env:
  DEPOT_TOOLS_UPDATE: 0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to update release and upload assets
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 curl xz-utils zip

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git .depot_tools
          echo "$GITHUB_WORKSPACE/.depot_tools" >> $GITHUB_PATH
          echo "PATH=$GITHUB_WORKSPACE/.depot_tools:$PATH" >> $GITHUB_ENV

      - name: Fetch Dart SDK
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Fetching Dart SDK with tag: $TAG"
          export PATH="$GITHUB_WORKSPACE/.depot_tools:$PATH"
          git config --global core.autocrlf false
          mkdir -p dart-sdk
          cd dart-sdk
          fetch --no-history dart
          cd sdk
          git fetch origin "refs/tags/$TAG:refs/tags/$TAG"
          git checkout -f "tags/$TAG"
          gclient sync -D --no-history
          cd ../..
          git config --global core.autocrlf true

      - name: Add libdartengine group to BUILD.gn
        run: |
          cd dart-sdk/sdk
          python3 << 'PYEOF'
          import textwrap
          path = "BUILD.gn"
          with open(path, "r") as f:
              content = f.read()
          insert = textwrap.dedent("""
          group("libdartengine") {
            deps = [
              "runtime/engine:dart_engine_jit_shared",
              "runtime/engine:dart_engine_aot_shared",
              "runtime/bin:gen_snapshot",
              "runtime/bin:dartaotruntime",
              "utils/gen_kernel:gen_kernel",
            ]
          }

          """)
          # Insert after group("analysis_server") block
          # Match BUILD.gn style (one space before deps in analysis_server block)
          old_block = textwrap.dedent("""
          group("analysis_server") {
            deps = [ "utils/analysis_server" ]
          }
          """)
          if old_block not in content:
              old_block = textwrap.dedent("""
          group("analysis_server") {
           deps = [ "utils/analysis_server" ]
          }
          """)
          if old_block in content:
              content = content.replace(old_block, old_block + insert, 1)
          else:
              # Fallback: insert before "if (is_fuchsia)"
              content = content.replace('if (is_fuchsia) {', insert + 'if (is_fuchsia) {', 1)
          with open(path, "w") as f:
              f.write(content)
          PYEOF
          echo "Added libdartengine group. Relevant snippet:"
          grep -A 4 'group("libdartengine")' BUILD.gn

      - name: Build libdartengine
        run: |
          cd dart-sdk/sdk
          ./tools/build.py -m release libdartengine

      - name: Locate built artifacts and create zip
        id: artifacts
        run: |
          cd dart-sdk/sdk
          # Linux puts output in out/ReleaseX64 (or similar)
          JIT=$(find out -name 'libdart_engine_jit_shared.so' 2>/dev/null | head -1)
          AOT=$(find out -name 'libdart_engine_aot_shared.so' 2>/dev/null | head -1)
          if [ -z "$JIT" ] || [ -z "$AOT" ]; then
            echo "Build output layout:"
            find out -name '*.so' 2>/dev/null || true
            exit 1
          fi
          BUILD_DIR=$(dirname "$JIT")
          GEN_SNAPSHOT=$(find "$BUILD_DIR" -maxdepth 2 -name 'gen_snapshot' -type f 2>/dev/null | head -1)
          DARTAOTRUNTIME=$(find "$BUILD_DIR" -maxdepth 2 -name 'dartaotruntime' -type f 2>/dev/null | head -1)
          VM_PLATFORM=$(find "$BUILD_DIR" -maxdepth 2 -name 'vm_platform.dill' 2>/dev/null | head -1)
          GEN_KERNEL_AOT=$(find "$BUILD_DIR" -maxdepth 2 -name 'gen_kernel_aot.dart.snapshot' 2>/dev/null | head -1)
          if [ -z "$GEN_SNAPSHOT" ] || [ -z "$VM_PLATFORM" ] || [ -z "$GEN_KERNEL_AOT" ] || [ -z "$DARTAOTRUNTIME" ]; then
            echo "Missing gen_snapshot, dartaotruntime, vm_platform.dill or gen_kernel_aot.dart.snapshot. Build layout:"
            find out -maxdepth 4 -type f \( -name 'gen_snapshot' -o -name 'dartaotruntime' -o -name 'vm_platform.dill' -o -name 'gen_kernel_aot.dart.snapshot' \) 2>/dev/null || true
            exit 1
          fi
          ZIP_NAME="dartengine-${{ github.event.release.tag_name }}-linux.zip"
          mkdir -p release_zip
          cp "$JIT" "$AOT" "$GEN_SNAPSHOT" "$DARTAOTRUNTIME" "$VM_PLATFORM" "$GEN_KERNEL_AOT" release_zip/
          cd release_zip && zip -r "../$ZIP_NAME" . && cd ..
          mv "$ZIP_NAME" "$GITHUB_WORKSPACE/$ZIP_NAME"
          echo "zip_path=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "Created $ZIP_NAME with .so, gen_snapshot, dartaotruntime, vm_platform.dill, gen_kernel_aot.dart.snapshot"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ steps.artifacts.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
